<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Sax Master Tuner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* 全体の基本設定 */
        body {
            margin: 0;
            padding: 10px; /* 余白を少し詰める */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* dvhを使うことでブラウザのツールバーを考慮した高さになります */
            height: 100dvh; 
            background: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden; /* 画面が揺れるのを防ぐ */
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* 要素を上下にきれいに分散させる */
            justify-content: space-between; 
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneのホームバー対策 */
        }

        h1 { 
            font-size: 1.2rem; /* 少し小さくしてスペースを稼ぐ */
            margin: 10px 0; 
        }

        #note {
            /* 高さが足りない場合を考慮して、少し控えめなサイズに調整 */
            font-size: clamp(60px, 20vh, 120px); 
            font-weight: bold;
            color: #00ffcc;
            margin: 0;
        }

        #freq { font-size: 1rem; color: #888; margin-bottom: 5px; }

        canvas {
            width: 100%;
            max-height: 100px; /* メーターの高さを制限 */
            background: #222;
            border-radius: 8px;
            aspect-ratio: 400 / 120;
        }

        .controls {
            width: 100%;
            display: flex;
            gap: 8px;
            margin: 5px 0;
        }

        button, select {
            padding: 10px; /* パディングを少し詰める */
            font-size: 0.95rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            flex: 1;
        }

        /* スタートボタン */
        .btn-tuning {
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
            margin-bottom: 10px; /* 下端にピッタリつきすぎないように */
            padding: 15px;
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-weight: bold;
        }

        .btn-tuning.active { background: #00ffcc; color: #1a1a1a; }
        .active { background: #00ffcc !important; color: #1a1a1a !important; font-weight: bold; }
        .inactive { background: #444; color: #ccc; }
        .info { color: #888; font-size: 0.75rem; margin-top: 5px; text-align: center; }

        select { background: #333; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>
    <h1>Sax Master Tuner</h1>
    
    <div class="controls" style="margin: 10px">
        <button id="pianoBtn" class="active" onclick="setMode('piano')">Piano</button>
        <button id="saxBtn" class="inactive" onclick="setMode('sax')">A.Sax (E♭)</button>
    </div>

    <div id="note">--</div>
    <div id="freq">0.00 Hz</div>

    <canvas id="meter" width="400" height="120"></canvas>

    <div class="controls" style="margin-top: 10px;">
        <label for="speedSelect" style="font-size: 0.9rem; color: #aaa;">Refresh Rate:</label>
        <select id="speedSelect" onchange="changeSpeed()" style="padding: 5px; border-radius: 5px; background: #333; color: #fff; border: 1px solid #555;">
            <option value="100">Instant (Real-time)</option>
            <option value="500" selected>Normal (0.5s)</option>
            <option value="1000">Stable (1.0s)</option>
        </select>
    </div>

    <div class="info">
        ※Range: ±10Hz. Check your octave accuracy.
    </div>

    <button id="startBtn" class="btn-tuning" onclick="startTuner()">
        LISTEN / START
    </button>
    
    <script>
        let mic, analyser;
        let mode = 'piano'; // 'piano' or 'sax'
        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        // サックスモードかピアノモードかを設定
        function setMode(m) {
            mode = m;
            document.getElementById('pianoBtn').className = (m === 'piano' ? 'active' : 'inactive');
            document.getElementById('saxBtn').className = (m === 'sax' ? 'active' : 'inactive');
        }

        // チューナー開始
        async function startTuner() {
            const btn = document.getElementById('startBtn');
            
            // クラスをトグル（あれば消す、なければ足す）
            btn.classList.toggle('active');

            if (btn.classList.contains('active')) {
                // --- 起動処理 ---
                btn.innerText = "STOP / ACTIVE";
                
                // ブラウザで音声処理を始めるための「許可をもらう」動作
                await Tone.start();

                // マイクを使うためのオブジェクト
                mic = new Tone.UserMedia();

                // マイクの音を「波形データ」として読み取る
                analyser = new Tone.Analyser("waveform", 2048);

                // マイクの使用許可をユーザーに求める
                await mic.open();
                
                // マイクの音を解析器につなぐ
                mic.connect(analyser);

                // 0.1秒ごとに updateTuner() を呼び出して、「今の音は何Hz？」を調べ続ける
                // setInterval(updateTuner, 100);
                // 初回起動
                const speed = document.getElementById('speedSelect').value;
                updateInterval = setInterval(updateTuner, parseInt(speed));
                
                // ボタンの文言を変えるなどの演出
                document.querySelector('.btn-start').innerText = "TUNING...";
            } else {
                // --- 停止処理 ---
                btn.innerText = "LISTEN / START";
                
                if (mic) {
                    mic.close(); // マイクを止める
                    clearInterval(updateInterval); // 更新を止める
                }
            }
        }

        // 設定した周期ごとに音を検証
        function updateTuner() {
            // マイクから取った波形データ（音の形）を取得
            const buffer = analyser.getValue();

            // 波形から「音の高さ（周波数）」を計算する関数(440Hz なら A（ラ）など)
            const sampleRate = Tone.context.sampleRate;
            const frequency = autoCorrelate(buffer, sampleRate);

            // キャンバスをクリアしてスケールを描く
            const canvas = document.getElementById('meter');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // チューナーの背景（目盛り）を描写
            drawScale(ctx, canvas.width, canvas.height);

            // 音が鳴っている場合
            if (frequency !== -1) {
                /*
                ** 周波数が取れたら音名を計算する
                ** 周波数 → MIDIノート番号 に変換する式。
                ** MIDIノート番号は「音の高さを数字で表す共通ルール」
                ** 440Hz → 69（A4）
                ** 466Hz → 70（A#4）
                */
                let midiNum = 12 * Math.log2(frequency / 440) + 69;
                
                /* アルトサックス(Eb管)の移調対応
                ** 楽譜のC(ド) = 実音のEb(ミb) なので、表示は実音から「3半音分」引く
                ** 実音：E♭
                ** 楽譜：C
                **/
                let displayMidiNum = (mode === 'sax') ? midiNum - 3 : midiNum;
                
                /* マイナスのインデックスにならないよう調整して音名を取得
                ** MIDI番号を 12 で割った余り → 音名（C, C#, D...）
                ** 周波数も表示
                */ 
                const noteIndex = (Math.round(displayMidiNum) % 12 + 12) % 12;
                document.getElementById('note').innerText = noteNames[noteIndex];
                document.getElementById('freq').innerText = frequency.toFixed(2) + " Hz";

                /* ターゲット（理想のピッチ）との差分
                ** 移調に関わらず、鳴っている実音のHzがその音の理想値からどれだけズレているかを表示
                ** その音の理想的な周波数（perfectPitch）を計算
                ** ・実際の周波数との差（diff）を求める
                ** ・diff がプラス → 高い
                ** ・diff がマイナス → 低い
                ** ・それを針の角度に反映して描画
                */
                const perfectPitch = 440 * Math.pow(2, (Math.round(midiNum) - 69) / 12);
                const diff = frequency - perfectPitch;

                drawNeedle(ctx, diff, canvas.width, canvas.height);
            }
        }

        // マイクの波形データから「音の高さ（周波数）」を計算
        // 自己相関法（Auto-correlation）」という、
        // チューナーでよく使われる周波数検出アルゴリズム
        function autoCorrelate(buffer, sampleRate) {
            let size = buffer.length;

            /* 
            ** 音が小さすぎたら無視する
            ** rms は音の大きさ（音量）を表す値
            ** 小さすぎる（0.01以下）なら「音がない」と判断して -1 を返す
            */
            let rms = 0;
            for (let i = 0; i < size; i++) rms += buffer[i] * buffer[i];
            rms = Math.sqrt(rms / size);
            if (rms < 0.01) return -1;

            /* 
            ** 波形の“静かな部分”を探して切り取る
            ** 波形の端の「静かな部分」を探して切り落とす
            ** 余計なノイズを減らして精度を上げるため
            */
            let r1 = 0, r2 = size - 1, thres = 0.2;
            for (let i = 0; i < size / 2; i++) { if (Math.abs(buffer[i]) < thres) { r1 = i; break; } }
            for (let i = 1; i < size / 2; i++) { if (Math.abs(buffer[size - i]) < thres) { r2 = size - i; break; } }
            let buf = buffer.slice(r1, r2);
            
            /* 
            ** 自己相関を計算する
            ** 周波数検出の核心。
            ** 波形を「少しずつずらして重ね合わせる」
            ** 重なりが一番似ている位置（maxpos）が
            ** → 波形の周期（1周期の長さ）
            */
            size = buf.length;
            let c = new Array(size).fill(0);
            for (let i = 0; i < size; i++) {
                for (let j = 0; j < size - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            }

            /* 
            ** 周期の位置を探す
            ** 最初の谷を飛ばして
            ** 一番大きな山（周期の位置）を探す
            */
            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < size; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
            
            /* 
            ** 周波数に変換
            ** 周期（maxpos）を使って
            ** 周波数 = サンプルレート ÷ 周期で音の高さを求める
            */
            return sampleRate / maxpos;
        }

        // チューナーの背景（目盛り）を描写
        function drawScale(ctx, w, h) {
            // 真ん中の縦線（基準線）を描く
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(w / 2, 10); ctx.lineTo(w / 2, h - 10);
            ctx.stroke();

            /* 
            ** 左：低い
            ** 真ん中：ぴったり
            ** 右：高い
            ** という目盛りを描く
            */
            ctx.fillStyle = "#888";
            ctx.textAlign = "center";
            ctx.fillText("-10Hz", 30, h - 10);
            ctx.fillText("Center", w / 2, h - 10);
            ctx.fillText("+10Hz", w - 30, h - 10);
        }

        // ピッチのズレに応じて針を描写
        function drawNeedle(ctx, diff, w, h) {
            /* 
            ** diff（Hzのズレ）を 0〜1 の範囲に変換
            ** 画面の幅に合わせて針の位置を決める
            */
            let ratio = (diff + 10) / 20; // ±10Hzの範囲
            ratio = Math.max(0, Math.min(1, ratio));
            const x = ratio * w;

            /* 
            ** 針の色と表示
            ** ±10Hz以内 → 緑（OK）
            ** それ以上 → 赤（ズレてる）
            */
            ctx.strokeStyle = Math.abs(diff) <= 10 ? "#00ffcc" : "#ff4444";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x, 20); ctx.lineTo(x, h - 30);
            ctx.stroke();
            ctx.fillStyle = ctx.strokeStyle;
            
            // 針の上に「+3.2Hz」などのズレを表示
            ctx.fillText((diff > 0 ? "+" : "") + diff.toFixed(1) + " Hz", x, 15);
        }

        // サービスワーカー（sw.js）をブラウザに登録する
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered!'))
                .catch(err => console.error('Service Worker failed:', err));
            });
        }
    </script>
    <style>

    </style>
</body>
</html>
