<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Sax Motivation Tuner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* 全体の基本設定 */
        body {
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 固定ではなく、最低100%確保。はみ出た場合はスクロールを許可 */
            min-height: 100dvh; 
            background: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            overflow-y: auto; /* 見切れた場合にスクロールできるように変更 */
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            /* 100%固定をやめて要素間のバランスをとる */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 1.2rem; /* 少し小さくしてスペースを稼ぐ */
            margin: 10px 0; 
        }

        /* --- 音符表示のサイズ微調整 --- */
        #note {
            /* 画面の高さに合わせて柔軟にサイズを変える clamp を活用 */
            font-size: clamp(50px, 15vh, 100px); 
            font-weight: bold;
            color: #00ffcc;
            margin: 5px 0;
        }

        #freq { font-size: 1rem; color: #888; margin-bottom: 5px; }

        canvas {
            width: 100%;
            max-height: 100px; /* メーターの高さを制限 */
            background: #222;
            border-radius: 8px;
            aspect-ratio: 400 / 120;
        }

        .controls {
            width: 100%;
            display: flex;
            gap: 8px;
            margin: 5px 0;
        }

        button, select {
            padding: 10px; /* パディングを少し詰める */
            font-size: 0.95rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            flex: 1;
        }

        /* スタートボタン */
        .btn-tuning {
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
            padding: 12px; /* 少しスリムに */
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            font-weight: bold;
            /* 下端で見切れないように余白を確保 */
            margin-bottom: env(safe-area-inset-bottom);
        }

        .btn-tuning.active { background: #00ffcc; color: #1a1a1a; }
        .active { background: #00ffcc !important; color: #1a1a1a !important; font-weight: bold; }
        .inactive { background: #444; color: #ccc; }
        .info { color: #888; font-size: 0.75rem; margin-top: 5px; text-align: center; }

        select { background: #333; color: #fff; border: 1px solid #555; }
    
        /* --- 余白の圧縮 --- */
        .volume-section {
            width: 95%;
            margin: 10px 0; /* 20pxから10pxに短縮 */
        }

        .volume-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .volume-header .label {
            font-size: 0.8rem;
            color: #aaa;
        }

        #db-display {
            font-size: 0.9rem;
            color: #00ffcc;
            font-family: monospace;
        }

        /* メーターの外枠 */
        #volume-container {
            width: 100%;
            height: 25px;
            background: #333;
            border-radius: 12px;
            border: 2px solid #444;
            overflow: hidden;
        }

        /* メーターの中身（バー） */
        #volume-bar {
            width: 0%;
            height: 100%;
            background-color: aqua; /* 初期色は水色 */
            transition: width 0.1s ease-out, background-color 0.2s; /* 色の変化も滑らかに */
        }

        /* 掛け声のスタイル */
        #shout-box {
            width: 90%; /* 画面幅に合わせる */
            min-height: 80px; /* 高さを確保 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            margin: 10px auto;
            
            /* --- 見切れ対策の重要設定 --- */
            word-break: break-word; /* 長い単語でも強制改行 */
            overflow-wrap: break-word; 
            line-height: 1.2;
            /* フォントサイズをvw（画面幅基準）にして、スマホでも収まりやすくする */
            font-size: clamp(1.2rem, 5vw, 2.5rem); 
            
            transition: opacity 0.5s ease;
        }

        /* --- Chrome Mobile 用の強制フィット設定 --- */
        @media screen and (-webkit-min-device-pixel-ratio:0) {
            /* Chromeのみ、app-containerの高さを 92dvh 程度に抑えてツールバー分の食い込みを回避 */
            .app-container {
                height: 92dvh !important;
                justify-content: space-evenly !important; /* 余白を均等にして詰める */
            }

            /* 各要素の余白をさらにダイエット */
            h1 { font-size: 1.1rem !important; margin: 2px 0 !important; }
            #note { font-size: clamp(50px, 15vh, 85px) !important; }
            #shout-box { height: 60px !important; margin: 0 !important; }
            .volume-section { margin: 5px 0 !important; }
        }

        /* --- iPhoneのSafari等の挙動も安定させるための保険 --- */
        @supports (-webkit-touch-callout: none) {
            .app-container {
                /* iOS Safariなどの場合は 95dvh 程度が最適 */
                height: 95dvh;
            }
        }

        /* --- PC/Chrome向け：スクロールを完全に封じ込める調整 --- */
        @media screen and (min-width: 768px) {
            body {
                /* スクロールを禁止し、中身を中央に寄せる */
                overflow: hidden !important; 
                padding: 0; 
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .app-container {
                /* 固定の高さではなく、ブラウザの表示枠に対して余裕を持たせる */
                height: 90vh !important; 
                width: 95%;
                max-width: 480px;
                /* 要素間の隙間を詰め、中央に寄せる */
                justify-content: center !important; 
                gap: 5px !important; 
            }

            /* 各パーツを数ピクセルずつダイエット */
            h1 { font-size: 1.1rem !important; margin-bottom: 2px !important; }
            
            #note {
                font-size: 70px !important; /* PCではこのサイズが安定します */
                line-height: 1 !important;
            }

            canvas {
                max-height: 70px !important; /* メーターをさらにスリムに */
            }

            #shout-box {
                height: 50px !important; /* 叫び声エリアを圧縮 */
                font-size: 1.3rem !important;
            }

            .volume-section {
                margin: 2px 0 !important;
            }

            .btn-tuning {
                padding: 8px !important;
                margin-top: 5px !important;
            }
        }
    </style>
</head>
<body>
    <h1>Sax Motivation Tuner</h1>
    
    <div class="controls" style="margin: 10px">
        <button id="pianoBtn" class="active" onclick="setMode('piano')">Piano</button>
        <button id="saxBtn" class="inactive" onclick="setMode('sax')">A.Sax (E♭)</button>
    </div>

    <div id="note">--</div>
    <div id="freq">0.00 Hz</div>

    <canvas id="meter" width="400" height="120"></canvas>

    <div class="controls" style="margin-top: 10px;">
        <label for="speedSelect" style="font-size: 0.9rem; color: #aaa;">Refresh Rate:</label>
        <select id="speedSelect" onchange="changeSpeed()" style="padding: 5px; border-radius: 5px; background: #333; color: #fff; border: 1px solid #555;">
            <option value="100">Instant (Real-time)</option>
            <option value="500" selected>Normal (0.5s)</option>
            <option value="1000">Stable (1.0s)</option>
        </select>
    </div>

    <div class="info">
        ※Range: ±10Hz. Check your octave accuracy.
    </div>

    <div class="volume-section">
        <div class="volume-header">
            <span class="label">VOLUME</span>
            <span id="db-display">-100.0 dB</span>
        </div>
        <div id="volume-container">
            <div id="volume-bar"></div>
        </div>
    </div>

    <div id="shout-box"></div>

    <button id="startBtn" class="btn-tuning" onclick="startTuner()">
        LISTEN / START
    </button>
    
    <script src="./script.js"></script>
    <style>

    </style>
</body>
</html>
